  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

);\n      display: flex; align-items: center; justify-content: center;\n      flex-shrink: 0;\n    }\n    .info-item:nth-child(2) .info-icon { background: var(--purple-light); }\n    .info-item:nth-child(3) .info-icon { background: oklch(0.93 0.05 220); }\n    .info-label {\n      font-size: 0.7rem; font-weight: 700;\n      letter-spacing: 0.12em; text-transform: uppercase;\n      color: var(--mid); margin-bottom: 0.15rem;\n    }\n    .info-value { font-weight: 600; font-size: 0.95rem; color: var(--dark); }\n\n    .availability-card {\n      background: white;\n      border: 1px solid var(--border);\n      border-radius: 16px;\n      padding: 1.4rem 1.5rem;\n      display: flex; align-items: flex-start; gap: 0.9rem;\n    }\n    .avail-pulse {\n      position: relative;\n      width: 12px; height: 12px; border-radius: 50%;\n      background: var(--green);\n      flex-shrink: 0; margin-top: 0.4rem;\n    }\n    .avail-pulse::after {\n      content: '';\n      position: absolute; inset: -6px;\n      border-radius: 50%;\n      background: var(--green); opacity: 0.25;\n      animation: pulse 2s ease-out infinite;\n    }\n    @keyframes pulse {\n      0% { transform: scale(0.6); opacity: 0.45; }\n      100% { transform: scale(1.6); opacity: 0; }\n    }\n    .avail-title { font-weight: 700; font-size: 0.95rem; color: var(--dark); margin-bottom: 0.2rem; }\n    .avail-text { font-size: 0.82rem; color: var(--mid); line-height: 1.6; }\n\n    /* RIGHT — form */\n    .form-col { position: relative; z-index: 1; }\n    .form-card {\n      background: white;\n      border: 1px solid var(--border);\n      border-radius: 24px;\n      padding: 2.5rem;\n      box-shadow: 0 12px 36px oklch(0.14 0.025 155 / 0.06);\n      position: relative; overflow: hidden;\n    }\n    .form-card::before {\n      content: '';\n      position: absolute; top: 0; left: 0; right: 0;\n      height: 4px;\n      background: linear-gradient(90deg, var(--green), var(--purple));\n    }\n    .form-heading {\n n      font-size: 0.78rem; color: var(--mid);\n      max-width: 240px; line-height: 1.5;\n    }\n\n    .topic-row {\n      display: flex; flex-wrap: wrap; gap: 0.5rem;\n      margin-top: 0.45rem;\n    }\n    .topic {\n      font-size: 0.78rem; font-weight: 500;\n      padding: 0.4rem 0.85rem;\n      border-radius: 100px;\n      background: var(--off-white);\n      color: var(--mid);\n      border: 1px solid var(--border);\n      cursor: pointer;\n      transition: all 0.2s;\n      user-select: none;\n    }\n    .topic:hover { border-color: var(--green); color: var(--green); }\n    .topic.active {\n      background: var(--green); color: white;\n      border-color: var(--green);\n    }\n\n    footer {\n      background: var(--dark);\n      border-top: 1px solid oklch(0.22 0.03 155);\n      text-align: center; padding: 1.5rem;\n      color: oklch(0.55 0.04 155);\n      font-size: 0.78rem;\n    }\n\n    @media (max-width: 768px) {\n      nav { padding: 1rem 1.5rem; }\n      .nav-links { display: none; }\n      .page-wrap { grid-template-columns: 1fr; gap: 3rem; padding: 7.5rem 1.5rem 4rem; }\n      .form-card { padding: 2rem 1.5rem; }\n      .form-row { grid-template-columns: 1fr; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav>\n  <a class=\"nav-logo\" href=\"Portfolio.html\">Ekaterina Radeva<\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"Portfolio.html#about\">Intro<\u002Fa><\u002Fli>\n    <li><a href=\"work.html\">My Work<\u002Fa><\u002Fli>\n    <li><a href=\"references.html\">References<\u002Fa><\u002Fli>\n    <li><a href=\"why-me.html\">Worth Knowing<\u002Fa><\u002Fli>\n    <li><a class=\"active\" href=\"contact.html\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <a class=\"btn-primary\" href=\"mailto:ekradeva02@gmail.com\" style=\"font-size: 0.8rem; padding: 0.55rem 1.25rem;\">Hire Me<\u002Fa>\n<\u002Fnav>\n\n<div class=\"page-wrap\">\n\n  <!-- LEFT -->\n  <section class=\"info-col\">\n    <div class=\"page-tag\">Let's connect<\u002Fdiv>\n    <h1 class=\"page-title\">Tell me about <span>your project<\u002Fspan><\u002Fh1>\n    <p class=\"page-sub\">Whether you're hiring an Email marketing specialist, scoping out an E-commerce optimisation sprint, or just want to swap notes on cross-cultural marketing — I'd love to hear from you. <strong style=\"color:var(--dark);\">Got a real challenge from your interview process? Send it over.<\u002Fstrong><\u002Fp>\n\n    <div class=\"info-list\">\n      <a class=\"info-item\" href=\"mailto:ekradeva02@gmail.com\">\n        <div class=\"info-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\">\n            <rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\" stroke=\"oklch(0.46 0.17 155)\" stroke-width=\"2\"><\u002Frect>\n            <path d=\"M2 8l10 6 10-6\" stroke=\"oklch(0.46 0.17 155)\" stroke-width=\"2\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"info-label\">Email<\u002Fdiv>\n          <div class=\"info-value\">ekradeva02@gmail.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a class=\"info-item\" href=\"tel:+359888011019\">\n        <div class=\"info-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\">\n            <path d=\"M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z\" stroke=\"oklch(0.46 0.17 300)\" stroke-width=\"2\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"info-label\">Phone<\u002Fdiv>\n          <div class=\"info-value\">+359 88 801 1019 | +31 6 14017276<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a class=\"info-item\" href=\"https://www.linkedin.com/in/ekaterina-radeva-134404272/\" target=\"_blank\" rel=\"noopener\">\n        <div class=\"info-icon\" style=\"background: oklch(0.93 0.05 230);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"oklch(0.45 0.14 230)\" aria-hidden=\"true\">\n            <path d=\"M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.36V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.55V9h3.57v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"info-label\">LinkedIn<\u002Fdiv>\n          <div class=\"info-value\">Ekaterina Radeva<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <div class=\"info-item\" style=\"cursor: default;\">\n        <div class=\"info-icon\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\">\n            <path d=\"M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z\" stroke=\"oklch(0.45 0.14 220)\" stroke-width=\"1.5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"info-label\">Based in<\u002Fdiv>\n          <div class=\"info-value\">Groningen, The Netherlands<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"availability-card\">\n      <div class=\"avail-pulse\"><\u002Fdiv>\n      <div>\n        <div class=\"avail-title\">Available for new opportunities<\u002Fdiv>\n        <div class=\"avail-text\">Open to conversations about full-time positions, freelance Email or E-commerce work and long-term consulting.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RIGHT — Form -->\n  <section class=\"form-col\">\n    <form class=\"form-card\" id=\"contact-form\" onsubmit=\"return handleSubmit(event)\">\n      <h2 class=\"form-heading\">Send a <span>message<\u002Fspan><\u002Fh2>\n      <p class=\"form-sub\">Fill this in and hit send — your message lands straight in my inbox. No email client, no extra steps.<\u002Fp>\n\n      <div class=\"form-row\">\n        <div class=\"field\">\n          <label for=\"name\">Your name<\u002Flabel>\n          <input type=\"text\" id=\"name\" name=\"name\" required=\"\" placeholder=\"Jane Doe\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label for=\"email\">Email<\u002Flabel>\n          <input type=\"email\" id=\"email\" name=\"email\" required=\"\" placeholder=\"jane@company.com\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"company\">Company / role <span style=\"text-transform:none;letter-spacing:0;font-weight:400;color:oklch(0.6 0.04 155);\">(optional)<\u002Fspan><\u002Flabel>\n        <input type=\"text\" id=\"company\" name=\"company\" placeholder=\"Acme · Marketing Lead\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label>What's this about?<\u002Flabel>\n        <div class=\"topic-row\" id=\"topic-row\">\n          <span class=\"topic active\" data-topic=\"Send me a challenge\">Send me a challenge<\u002Fspan>\n          <span class=\"topic\" data-topic=\"Full-time role\">Full-time role<\u002Fspan>\n          <span class=\"topic\" data-topic=\"Freelance / contract\">Freelance / contract<\u002Fspan>\n          <span class=\"topic\" data-topic=\"Email marketing project\">Email marketing<\u002Fspan>\n          <span class=\"topic\" data-topic=\"E-commerce / CRO\">E-commerce / CRO<\u002Fspan>\n          <span class=\"topic\" data-topic=\"Other\">Other<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"message\">Message<\u002Flabel>\n        <textarea id=\"message\" name=\"message\" required=\"\" placeholder=\"A few lines about what you're working on, the timeline, and what you'd like to discuss…\"><\u002Ftextarea>\n      <\u002Fdiv>\n\n      <div class=\"form-actions\">\n        <p class=\"form-note\">By sending you accept I'll reply by email. No data is stored on this site.<\u002Fp>\n        <button type=\"submit\" class=\"btn-primary\" id=\"submit-btn\">\n          Send message\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12h14M13 6l6 6-6 6\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"form-status\" id=\"form-status\" role=\"status\" aria-live=\"polite\"><\u002Fdiv>\n    <\u002Fform>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<footer>\n  © 2026 Ekaterina Radeva · E-Commerce &amp; Marketing Specialist\n<\u002Ffooter>\n\n<script>\n  // Topic chip selection\n  const topicRow = document.getElementById('topic-row');\n  let activeTopic = 'Send me a challenge';\n  topicRow.addEventListener('click', (e) => {\n    const t = e.target.closest('.topic');\n    if (!t) return;\n    topicRow.querySelectorAll('.topic').forEach(el => el.classList.remove('active'));\n    t.classList.add('active');\n    activeTopic = t.dataset.topic;\n  });\n\n  async function handleSubmit(e) {\n    e.preventDefault();\n    const f = e.target;\n    const btn = document.getElementById('submit-btn');\n    const status = document.getElementById('form-status');\n    status.className = 'form-status';\n    status.textContent = '';\n\n    const payload = {\n      name: f.name.value,\n      email: f.email.value,\n      company: f.company.value || '—',\n      topic: activeTopic,\n      message: f.message.value,\n      _subject: `Portfolio enquiry${activeTopic ? ' · ' + activeTopic : ''} — from ${f.name.value}`,\n      _template: 'table'\n    };\n\n    btn.disabled = true;\n    const original = btn.innerHTML;\n    btn.innerHTML = 'Sending…';\n\n    try {\n      const res = await fetch('https://formsubmit.co/ajax/ekradeva02@gmail.com', {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n        body: JSON.stringify(payload)\n      });\n      const data = await res.json();\n      if (res.ok && (data.success === true || data.success === 'true')) {\n        f.reset();\n        topicRow.querySelectorAll('.topic').forEach(el => el.classList.remove('active'));\n        topicRow.querySelector('.topic').classList.add('active');\n        activeTopic = 'Send me a challenge';\n        status.className = 'form-status success';\n        status.textContent = 'Thank you — your message is on its way to my inbox. I\\u2019ll be in touch soon!';\n      } else {\n        throw new Error('send-failed');\n      }\n    } catch (err) {\n      status.className = 'form-status error';\n      status.innerHTML = 'Something went wrong sending your message. Please email me directly at <a href=\"mailto:ekradeva02@gmail.com\">ekradeva02@gmail.com<\u002Fa>.';\n    } finally {\n      btn.disabled = false;\n      btn.innerHTML = original;\n    }\n    return false;\n  }\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
